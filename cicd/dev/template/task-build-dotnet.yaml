apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-dotnet
  namespace: {{.Values.dev.namespace}}
spec:
  description: Build and publish a .NET application with NFS package cache
  params:
    - name: dotnet-image
      description: Custom .NET builder image to use
      default: SWK3S:5000/kube/dotnet:9.0-noble
      type: string
    - name: nfs-server
      description: NFS server address
      default: 10.42.0.40
      type: string
    - name: nfs-path
      description: NFS server export path
      default: /exchange
      type: string
    - name: configuration
      description: Build configuration (Debug or Release)
      default: Release
      type: string
    - name: skip-npm
      description: Skip npm/pnpm build (use when frontend is pre-built)
      default: "true"
      type: string
  workspaces:
    - name: output
      description: Workspace containing the cloned repository
  steps:
    - name: restore-and-publish
      image: $(params.dotnet-image)
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.output.path)/source
      env:
        - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
          value: "true"
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "true"
        - name: NUGET_PACKAGES
          value: /exchange/cache/nuget
      volumeMounts:
        - name: nfs-cache
          mountPath: /exchange
      script: |
        #!/bin/sh
        set -e
        echo "=== .NET Restore and Publish ==="
        echo "NUGET_PACKAGES set to: $NUGET_PACKAGES"
        echo "Configuration: $(params.configuration)"
        echo "Skip NPM: $(params.skip-npm)"
        
        echo "📦 Restoring NuGet packages..."
        dotnet restore
        echo "✓ Restore passed"
        
        echo "🚀 Publishing application..."
        dotnet publish \
          -c $(params.configuration) \
          -o $(workspaces.output.path)/publish \
          /p:SkipNpm=$(params.skip-npm) \
          --no-restore
        echo "✓ Publish passed"
        
        echo "=== Build Complete ==="
        ls -la $(workspaces.output.path)/publish
      securityContext:
        runAsUser: 0

  volumes:
    - name: nfs-cache
      nfs:
        server: $(params.nfs-server)
        path: $(params.nfs-path)
        readOnly: false
