apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-dotnet
  namespace: {{.Values.dev.namespace}}
spec:
  description: Build and publish a .NET application with NFS package cache
  params:
    - name: dotnet-image
      description: Custom .NET builder image to use
      default: {{.Values.server.hostname}}:5000/kube/dotnet:9.0-noble
      type: string
    - name: configuration
      description: Build configuration (Debug or Release)
      default: Release
      type: string
    - name: solution
      description: Solution name
      type: string
    - name: project
      description: Project name
      type: string
    - name: skip-npm
      description: Skip npm/pnpm build (use when frontend is pre-built)
      default: "true"
      type: string
    - name: skip-nswag
      description: Skip NSwag build (use when frontend is pre-built)
      default: "true"
      type: string
  workspaces:
    - name: output
      description: Workspace containing the cloned repository
  steps:
    - name: restore-and-publish
      image: $(params.dotnet-image)
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.output.path)/source
      env:
        - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
          value: "true"
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "true"
        - name: NUGET_PACKAGES
          value: /exchange/cache/nuget
        - name: NUGET_XMLDOC_MODE
          value: "skip"
      volumeMounts:
        - name: nfs-cache
          mountPath: /exchange
      script: |
        #!/bin/sh
        set -e
        echo "=== .NET Restore and Publish ==="
        echo "NUGET_PACKAGES set to: $NUGET_PACKAGES"
        echo "Configuration: $(params.configuration)"
        echo "Skip NPM: $(params.skip-npm)"
        echo "Skip NSwag: $(params.skip-nswag)"
        
        echo "📦 Configuring NuGet sources..."
        dotnet nuget remove source nuget.org || true
        dotnet nuget add source /exchange/cache/nuget --name offline-cache
        
        echo "📦 Restoring NuGet packages..."
        dotnet restore $(params.solution) \
          --disable-parallel
        echo "✓ Restore passed"
        
        echo "🚀 Publishing application..."
        dotnet publish $(params.project) \
          -c $(params.configuration) \
          -o $(workspaces.output.path)/source/out \
          /p:SkipNpm=$(params.skip-npm) \
          /p:SkipNSwag=$(params.skip-nswag) \
          --no-restore
        echo "✓ Publish passed"
        
        echo "=== Build Complete ==="
        ls -la $(workspaces.output.path)/source/out
      securityContext:
        runAsUser: 0

  volumes:
    - name: nfs-cache
      nfs:
        server: 10.43.205.212
        path: /exchange
        readOnly: false
