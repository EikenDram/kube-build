apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea
  namespace: {{.Values.gitea.helm.namespace}}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{.Values.gitea.ingress}}.{{.Values.server.hostname | lower}}`)
      services:
        - name: gitea-http
          port: 3000
  tls:
    certResolver: default